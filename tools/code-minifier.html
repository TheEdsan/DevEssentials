<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Minificador y Formateador de Código gratuito. Optimiza JSON, CSS y HTML online sin registro." />
    <title>Optimizador de Código | DevEssentials</title>
    <link rel="stylesheet" href="../style.css">
    <style>
      .minifier-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        height: 500px;
      }
      @media (max-width: 768px) {
        .minifier-container {
          grid-template-columns: 1fr;
          height: auto;
        }
      }
      .code-area {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .code-area h3 {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-muted);
      }
      textarea {
        flex: 1;
        width: 100%;
        background: var(--bg-color);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-main);
        padding: 1.25rem;
        font-family: var(--font-mono);
        font-size: 0.875rem;
        resize: none;
        outline: none;
        transition: border-color 0.2s;
        line-height: 1.6;
      }
      textarea:focus {
        border-color: var(--primary);
      }
      .controls {
        display: flex;
        gap: 1rem;
        margin-top: 1.5rem;
        justify-content: center;
        grid-column: 1 / -1;
      }
      select {
        background: var(--bg-color);
        color: var(--text-main);
        border: 1px solid var(--border-color);
        padding: 0.5rem 1rem;
        border-radius: 6px;
        font-family: var(--font-family);
        outline: none;
        font-size: 0.875rem;
        cursor: pointer;
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--text-main);
        color: var(--bg-color);
        padding: 1rem 1.5rem;
        border-radius: 6px;
        font-weight: 500;
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.2s ease;
        z-index: 1000;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Navbar -->
      <nav class="navbar">
        <div class="logo">
          <a href="../index.html" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
            <div class="logo-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
            </div>
            <span class="logo-text">DevEssentials</span>
          </a>
        </div>
        <div class="nav-links">
          <a href="../index.html">Herramientas</a>
        </div>
      </nav>

      <!-- Tool Header -->
      <header class="tool-header">
        <h1>Optimizador de Código</h1>
        <p class="subtitle">Formatea o minifica tu código JSON, CSS y HTML instantáneamente.</p>
      </header>

      <!-- Main Content -->
      <main class="container">
        <div class="tool-workspace">
          <div class="minifier-container">
            <div class="code-area">
              <h3>Entrada</h3>
              <textarea id="inputCode" placeholder="Pega tu código aquí..."></textarea>
            </div>
            <div class="code-area">
              <h3>Salida</h3>
              <textarea id="outputCode" readonly placeholder="El resultado aparecerá aquí..."></textarea>
            </div>
          </div>
          
          <div class="controls">
            <select id="langSelect">
              <option value="json">JSON</option>
              <option value="css">CSS</option>
              <option value="html">HTML</option>
            </select>
            <button class="btn btn-secondary" id="formatBtn">Formatear</button>
            <button class="btn btn-secondary" id="minifyBtn">Minificar</button>
            <button class="btn" id="copyBtn">Copiar Resultado</button>
          </div>
        </div>
      </main>

      <!-- Toast Notification -->
      <div class="toast" id="toast">Copiado al portapapeles</div>

      <!-- Footer -->
      <footer class="footer">
        <p>&copy; 2026 DevEssentials.</p>
      </footer>
    </div>
    
    <script type="module" src="./code-minifier.js"></script>
  </body>
</html>
