<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Generador de Paletas de Colores gratuito. Crea paletas armónicas, aleatorias o basadas en teoría del color. Exporta a HEX y RGB." />
    <title>Generador de Paletas de Colores | DevEssentials</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
      .palette-container {
        display: flex;
        height: 60vh;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        margin-bottom: 2rem;
      }
      .color-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        padding-bottom: 2rem;
        transition: flex 0.3s ease;
        position: relative;
        cursor: pointer;
      }
      .color-pane:hover {
        flex: 1.2;
      }
      .color-hex {
        background: rgba(0, 0, 0, 0.5);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 1.2rem;
        backdrop-filter: blur(4px);
        margin-top: 1rem;
      }
      .controls {
        display: flex;
        justify-content: center;
        gap: 1rem;
        margin-top: 2rem;
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--primary);
        color: white;
        padding: 1rem 2rem;
        border-radius: 8px;
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.3s ease;
        z-index: 1000;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Navbar -->
      <nav class="navbar glass">
        <div class="logo">
          <a href="../index.html" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
            <span class="logo-icon">✨</span>
            <span class="logo-text">DevEssentials</span>
          </a>
        </div>
        <div class="nav-links">
          <a href="../index.html">Herramientas</a>
        </div>
      </nav>

      <!-- Tool Header -->
      <header class="tool-header">
        <h1 class="gradient-text">Generador de Paletas</h1>
        <p class="subtitle">Presiona la barra espaciadora o haz clic en el botón para generar nuevas paletas.</p>
      </header>

      <!-- Main Content -->
      <main class="container">
        <div class="tool-workspace glass" style="padding: 1rem;">
          <div class="palette-container" id="paletteContainer">
            <!-- Colores se inyectan por JS -->
          </div>
          <div class="controls">
            <button class="btn" id="generateBtn">Generar (Espacio)</button>
            <button class="btn" id="exportBtn" style="background: rgba(255,255,255,0.1); border: 1px solid var(--border-color);">Exportar CSS</button>
          </div>
        </div>
      </main>

      <!-- Toast Notification -->
      <div class="toast" id="toast">Copiado al portapapeles</div>

      <!-- Footer -->
      <footer class="footer">
        <p>&copy; 2026 DevEssentials.</p>
      </footer>
    </div>
    
    <script type="module" src="./color-palette.js"></script>
  </body>
</html>
