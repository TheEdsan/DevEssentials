<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Generador de Paletas de Colores gratuito. Crea paletas armónicas, aleatorias o basadas en teoría del color. Exporta a HEX y RGB." />
    <title>Generador de Paletas | DevEssentials</title>
    <link rel="stylesheet" href="../style.css">
    <style>
      .palette-container {
        display: flex;
        height: 50vh;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid var(--border-color);
        margin-bottom: 2rem;
      }
      .color-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        padding-bottom: 2rem;
        transition: flex 0.2s ease;
        position: relative;
        cursor: pointer;
      }
      .color-pane:hover {
        flex: 1.1;
      }
      .color-hex {
        background: var(--bg-color);
        color: var(--text-main);
        padding: 0.5rem 1rem;
        border-radius: 6px;
        font-family: var(--font-mono);
        font-size: 1rem;
        border: 1px solid var(--border-color);
        margin-top: 1rem;
      }
      .controls {
        display: flex;
        justify-content: center;
        gap: 1rem;
        margin-top: 2rem;
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--text-main);
        color: var(--bg-color);
        padding: 1rem 1.5rem;
        border-radius: 6px;
        font-weight: 500;
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.2s ease;
        z-index: 1000;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Navbar -->
      <nav class="navbar">
        <div class="logo">
          <a href="../index.html" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
            <div class="logo-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
            </div>
            <span class="logo-text">DevEssentials</span>
          </a>
        </div>
        <div class="nav-links">
          <a href="../index.html">Herramientas</a>
        </div>
      </nav>

      <!-- Tool Header -->
      <header class="tool-header">
        <h1>Generador de Paletas</h1>
        <p class="subtitle">Presiona la barra espaciadora para generar, haz clic para copiar.</p>
      </header>

      <!-- Main Content -->
      <main class="container">
        <div class="tool-workspace">
          <div class="palette-container" id="paletteContainer">
            <!-- Colores se inyectan por JS -->
          </div>
          <div class="controls">
            <button class="btn" id="generateBtn">Generar (Espacio)</button>
            <button class="btn btn-secondary" id="exportBtn">Exportar CSS</button>
          </div>
        </div>
      </main>

      <!-- Toast Notification -->
      <div class="toast" id="toast">Copiado al portapapeles</div>

      <!-- Footer -->
      <footer class="footer">
        <p>&copy; 2026 DevEssentials.</p>
      </footer>
    </div>
    
    <script type="module" src="./color-palette.js"></script>
  </body>
</html>
