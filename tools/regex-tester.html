<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Validador de Expresiones Regulares en tiempo real." />
    <title>Validador de RegEx | DevEssentials</title>
    <link rel="stylesheet" href="../style.css">
    <style>
      .regex-container {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }
      .input-group {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .input-group h3 {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-muted);
      }
      input[type="text"], textarea {
        width: 100%;
        background: var(--bg-color);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-main);
        padding: 1rem;
        font-family: var(--font-mono);
        font-size: 0.875rem;
        outline: none;
        transition: border-color 0.2s;
      }
      input[type="text"]:focus, textarea:focus {
        border-color: var(--primary);
      }
      textarea {
        resize: vertical;
        min-height: 150px;
      }
      .regex-header {
        display: flex;
        align-items: center;
        background: var(--bg-color);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding-right: 1rem;
      }
      .regex-header input {
        border: none;
        border-radius: 8px 0 0 8px;
        flex: 1;
      }
      .regex-header span {
        font-family: var(--font-mono);
        color: var(--text-muted);
      }
      .result-area {
        background: var(--bg-color);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1rem;
        font-family: var(--font-mono);
        font-size: 0.875rem;
        min-height: 100px;
        white-space: pre-wrap;
      }
      .match {
        background: rgba(255, 255, 255, 0.2);
        color: var(--primary);
        border-radius: 3px;
        padding: 0 2px;
      }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4206824002362807" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="app">
      <!-- Navbar -->
      <nav class="navbar">
        <div class="logo">
          <a href="../index.html" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
            <div class="logo-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
            </div>
            <span class="logo-text">DevEssentials</span>
          </a>
        </div>
        <div class="nav-links" style="display: flex; align-items: center; gap: 1.5rem;">
          <a href="../index.html">Herramientas</a>
          <a href="https://paypal.me/edu210406" target="_blank" rel="noopener noreferrer" class="btn btn-secondary" style="padding: 0.3rem 0.8rem; border-color: #0070ba; color: #0070ba; text-decoration: none; display: flex; align-items: center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M18 8c0 3.6-3.8 5-7.1 5H9.6L8 19.5"/><path d="M9.6 13H11c3.3 0 7.1-1.4 7.1-5s-3.8-5-7.1-5h-3.4c-.6 0-1 .4-1.1 1l-2.7 17"/></svg> PayPal
          </a>
        </div>
      </nav>

      <!-- Tool Header -->
      <header class="tool-header">
        <h1>Validador de Expresiones Regulares</h1>
        <p class="subtitle">Prueba tus Regex en tiempo real y encuentra coincidencias en tu texto.</p>
      </header>

      <!-- Main Content -->
      <main class="container">
        <div class="tool-workspace">
          <div class="regex-container">
            <div class="input-group">
              <h3>Expresión Regular</h3>
              <div class="regex-header">
                <span style="padding-left: 1rem;">/</span>
                <input type="text" id="regexInput" placeholder="^[a-zA-Z0-9]+$" value="[a-z]+">
                <span style="padding-right: 0.5rem;">/</span>
                <input type="text" id="flagsInput" value="gm" style="width: 50px; border: none; padding: 0.5rem; background: transparent; border-radius: 0;">
              </div>
            </div>
            
            <div class="input-group">
              <h3>Texto de Prueba</h3>
              <textarea id="testString">hello world 123
testing regex matching</textarea>
            </div>

            <div class="input-group">
              <h3>Coincidencias (Resultados)</h3>
              <div class="result-area" id="resultArea"></div>
            </div>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer class="footer">
        <p>&copy; 2026 DevEssentials.</p>
      </footer>
    </div>
    
    <script type="module" src="./regex-tester.js"></script>
  </body>
</html>
