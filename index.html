<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DevEssentials - Herramientas premium gratuitas para desarrolladores y diseñadores. Generadores, conversores y utilidades rápidas." />
    <title>DevEssentials | Professional Web Tools</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="app">
      <!-- Navbar -->
      <nav class="navbar">
        <div class="logo">
          <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
          </div>
          <span class="logo-text">DevEssentials</span>
        </div>
        <div class="nav-links">
          <a href="#" class="active">Herramientas</a>
          <a href="https://github.com/TheEdsan/DevEssentials" target="_blank" rel="noopener noreferrer">GitHub</a>
        </div>
      </nav>

      <!-- Hero Section -->
      <header class="hero">
        <h1 class="hero-title">Herramientas de Nivel Profesional<br>para Creadores</h1>
        <p class="subtitle">Acelera tu flujo de trabajo con nuestra suite de utilidades minimalistas, sin registro y de alto rendimiento.</p>
      </header>

      <!-- Main Content / Tools Grid -->
      <main class="container">
        <section class="tools-grid" id="toolsContainer">
          <!-- Las tarjetas de herramientas se renderizarán aquí vía JS -->
        </section>
      </main>

      <!-- Footer -->
      <footer class="footer">
        <p>&copy; 2026 DevEssentials. Open Source.</p>
      </footer>
    </div>
    
    <script type="module" src="./main.js"></script>
  </body>
</html>
